services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "3001:3000"
    # env_file removed: use OS environment variables
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      - db
    restart: always
    command: ["bun", "src/server.js"]

  db:
    image: postgres:16-alpine
    restart: always
    # env_file removed: use OS environment variables
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
