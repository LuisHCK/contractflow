services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "3001:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - NODE_ENV
      - DATABASE_URL
      - PORT
      - SECRET_KEY
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - ALLOWED_ORIGINS
      - MEMORY_COST
      - TIME_COST
    depends_on:
      - db
    restart: always
    command: ["bun", "src/server.js"]

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
