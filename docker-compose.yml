services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./:/app:delegated
    command: ["bun", "run", "dev"]
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mirror.gcr.io/library/postgres:16-alpine
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
