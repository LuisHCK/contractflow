services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./:/app
    command: ["bun", "run", "dev"]
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
